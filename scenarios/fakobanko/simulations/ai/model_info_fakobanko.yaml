    description: "API responses reveal model name (gpt-4-turbo), provider, and configuration parameters."
    severity: "low"
    evidence: |
      Model: gpt-4-turbo
      Provider: openai
      Max tokens: 4096, Temperature: 0.7
    check_name: "model_info_check"
