# simulations/network/tls_fakobanko.yaml
# Fakobanko scenario: TLS analysis reveals weak configuration

suite: network
emulates: tls_analysis
target: "www.fakobanko.local"
disposition: weak_tls

behavior:
  latency_ms: 500

output:
  protocol: "TLSv1.2"
  cipher_suite: "TLS_RSA_WITH_AES_128_CBC_SHA"
  certificate_expiry: "2025-03-15"
  supports_tls13: false
  weak_ciphers:
    - "TLS_RSA_WITH_AES_128_CBC_SHA"
    - "TLS_RSA_WITH_3DES_EDE_CBC_SHA"

findings:
  - title: "Weak TLS configuration on www.fakobanko.local"
    description: "TLS analysis found TLSv1.2 with weak cipher suites and no TLS 1.3 support. Certificate is expired."
    severity: "high"
    evidence: |
      Host: www.fakobanko.local
      Protocol: TLSv1.2 (TLS 1.3 not supported)
      Cipher: TLS_RSA_WITH_AES_128_CBC_SHA (weak)
      Certificate expired: 2025-03-15
      Weak ciphers accepted: 2
    check_name: "tls_analysis"
