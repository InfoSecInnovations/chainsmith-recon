# simulations/web/waf_fakobanko.yaml
# Fakobanko scenario: WAF detection

suite: web
emulates: waf_detection
target: "www.fakobanko.local"
disposition: waf_detected

behavior:
  latency_ms: 300

output:
  waf_detected: true
  waf_type: "Cloudflare"
  confidence: 0.85
