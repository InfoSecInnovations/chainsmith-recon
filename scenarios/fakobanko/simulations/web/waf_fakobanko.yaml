    description: "Cloudflare WAF detected with 85% confidence based on response headers and behavioral analysis."
    severity: "info"
    evidence: |
      WAF: Cloudflare (confidence: 85%)
      Indicators: cf-ray header, 403 on injection probes
    check_name: "waf_detection"
