# ─────────────────────────────────────────────────────────────────
# scenarios/demo-domain/docker-compose.yml
#
# Demo Domain — Generic IT helpdesk portal with AI assistant
#
# Services:
#   - localhost:8200 — Public helpdesk portal (www)
#   - localhost:8201 — LLM chatbot API (chat) [scenario-specific]
#   - localhost:8202 — REST API backend (api) [scenario-specific]
#   - localhost:8203 — MCP agent layer (agent)
#   - localhost:8204 — RAG knowledge base (rag) [NEW]
#   - localhost:8205 — Semantic response cache (cache) [NEW]
#   - localhost:8206 — Internal documentation portal (docs) [NEW]
#
# Start via range:
#   ./range/start-range.sh demo-domain
#
# Or directly:
#   docker network create chainsmith-shared 2>/dev/null || true
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────

services:

  # ─── Public Helpdesk Portal ────────────────────────────────────
  demo-domain-www:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: chainsmith/runtime:latest
    container_name: demo-domain-www
    command: >
      uvicorn services.www:app
      --host 0.0.0.0 --port 8200
    environment:
      - PYTHONPATH=/app:/app/scenarios/demo-domain
      - SERVICE_NAME=www
      - SERVICE_PORT=8200
      # Shared config paths
      - SCENARIO_CONFIG_PATH=/app/scenarios/demo-domain/scenario.json
      - SESSION_STATE_PATH=/app/data/session.json
      # Branding
      - BRAND_NAME=IT HelpDesk
      - BRAND_DOMAIN=corp.internal
      - CHAT_URL=http://localhost:8201
    volumes:
      - ../../app:/app/app:ro
      - ../:/app/scenarios:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:8200:8200"
    networks:
      - chainsmith-shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8200/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  # ─── LLM Chatbot API ───────────────────────────────────────────
  demo-domain-chat:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: chainsmith/runtime:latest
    container_name: demo-domain-chat
    command: >
      uvicorn services.chat:app
      --host 0.0.0.0 --port 8201
    environment:
      - PYTHONPATH=/app:/app/scenarios/demo-domain
      - SERVICE_NAME=chat
      - SERVICE_PORT=8201
      # Shared config paths
      - SCENARIO_CONFIG_PATH=/app/scenarios/demo-domain/scenario.json
      - SESSION_STATE_PATH=/app/data/session.json
      # LLM configuration
      - LLM_PROFILE=${LLM_PROFILE:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      - OLLAMA_BASE_URL=http://chainsmith-ollama:11434/v1
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
    volumes:
      - ../../app:/app/app:ro
      - ../:/app/scenarios:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:8201:8201"
    networks:
      - chainsmith-shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8201/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  # ─── REST API Backend ──────────────────────────────────────────
  demo-domain-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: chainsmith/runtime:latest
    container_name: demo-domain-api
    command: >
      uvicorn services.api:app
      --host 0.0.0.0 --port 8202
    environment:
      - PYTHONPATH=/app:/app/scenarios/demo-domain
      - SERVICE_NAME=api
      - SERVICE_PORT=8202
      # Shared config paths
      - SCENARIO_CONFIG_PATH=/app/scenarios/demo-domain/scenario.json
      - SESSION_STATE_PATH=/app/data/session.json
    volumes:
      - ../../app:/app/app:ro
      - ../:/app/scenarios:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:8202:8202"
    networks:
      - chainsmith-shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8202/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  # ─── MCP Agent Layer ───────────────────────────────────────────
  demo-domain-agent:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: chainsmith/runtime:latest
    container_name: demo-domain-agent
    command: >
      uvicorn services.agent:app
      --host 0.0.0.0 --port 8203
    environment:
      - PYTHONPATH=/app:/app/scenarios/demo-domain
      - SERVICE_NAME=agent
      - SERVICE_PORT=8203
      # Shared config paths
      - SCENARIO_CONFIG_PATH=/app/scenarios/demo-domain/scenario.json
      - SESSION_STATE_PATH=/app/data/session.json
      # Branding
      - BRAND_NAME=IT HelpDesk
      - BRAND_DOMAIN=corp.internal
      - MCP_SERVER_NAME=helpdesk-mcp
      # LLM configuration for agent reasoning
      - LLM_PROFILE=${LLM_PROFILE:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      - OLLAMA_BASE_URL=http://chainsmith-ollama:11434/v1
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      # Internal service URLs
      - CHAT_SERVICE_URL=http://demo-domain-chat:8201
      - API_SERVICE_URL=http://demo-domain-api:8202
      - RAG_SERVICE_URL=http://demo-domain-rag:8204
      - CACHE_SERVICE_URL=http://demo-domain-cache:8205
    volumes:
      - ../../app:/app/app:ro
      - ../:/app/scenarios:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:8203:8203"
    networks:
      - chainsmith-shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8203/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  # ─── RAG Knowledge Base ────────────────────────────────────────
  demo-domain-rag:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: chainsmith/runtime:latest
    container_name: demo-domain-rag
    command: >
      uvicorn services.rag:app
      --host 0.0.0.0 --port 8204
    environment:
      - PYTHONPATH=/app:/app/scenarios/demo-domain
      - SERVICE_NAME=rag
      - SERVICE_PORT=8204
      # Shared config paths
      - SCENARIO_CONFIG_PATH=/app/scenarios/demo-domain/scenario.json
      - SESSION_STATE_PATH=/app/data/session.json
      # Branding
      - BRAND_NAME=IT HelpDesk
      - BRAND_DOMAIN=corp.internal
    volumes:
      - ../../app:/app/app:ro
      - ../:/app/scenarios:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:8204:8204"
    networks:
      - chainsmith-shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8204/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  # ─── Semantic Response Cache ───────────────────────────────────
  demo-domain-cache:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: chainsmith/runtime:latest
    container_name: demo-domain-cache
    command: >
      uvicorn services.cache:app
      --host 0.0.0.0 --port 8205
    environment:
      - PYTHONPATH=/app:/app/scenarios/demo-domain
      - SERVICE_NAME=cache
      - SERVICE_PORT=8205
      # Shared config paths
      - SCENARIO_CONFIG_PATH=/app/scenarios/demo-domain/scenario.json
      - SESSION_STATE_PATH=/app/data/session.json
      # Branding
      - BRAND_NAME=IT HelpDesk
      - BRAND_DOMAIN=corp.internal
    volumes:
      - ../../app:/app/app:ro
      - ../:/app/scenarios:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:8205:8205"
    networks:
      - chainsmith-shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8205/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  # ─── Internal Documentation Portal ────────────────────────────
  demo-domain-docs:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: chainsmith/runtime:latest
    container_name: demo-domain-docs
    command: >
      uvicorn services.docs:app
      --host 0.0.0.0 --port 8206
    environment:
      - PYTHONPATH=/app:/app/scenarios/demo-domain
      - SERVICE_NAME=docs
      - SERVICE_PORT=8206
      # Shared config paths
      - SCENARIO_CONFIG_PATH=/app/scenarios/demo-domain/scenario.json
      - SESSION_STATE_PATH=/app/data/session.json
      # Branding
      - BRAND_NAME=IT HelpDesk
      - BRAND_DOMAIN=corp.internal
    volumes:
      - ../../app:/app/app:ro
      - ../:/app/scenarios:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:8206:8206"
    networks:
      - chainsmith-shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8206/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


networks:
  chainsmith-shared:
    name: chainsmith-shared
    external: true
