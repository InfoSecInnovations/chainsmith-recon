# Rate limit check — no rate limit on chat
suite: ai
emulates: rate_limit_check
target: "localhost"
disposition: no_rate_limit

behavior:
  latency_ms: 500

output:
  host: "localhost:8201"
  requests_sent: 50
  requests_succeeded: 50
  rate_limited: false

findings:
