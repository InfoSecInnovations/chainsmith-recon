# MCP tool enumeration — sensitive tools exposed
suite: mcp
emulates: mcp_tool_enumeration
target: "localhost"
disposition: sensitive_tools

behavior:
  latency_ms: 250

output:
  host: "localhost:8203"
  tools:
    - exec_command
    - read_file
    - query_database
    - manage_users

findings:
