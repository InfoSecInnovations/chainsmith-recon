# DNS enumeration discovers 7 services on localhost
suite: network
emulates: dns_enumeration
target: "localhost"
disposition: hosts_found

behavior:
  latency_ms: 200

output:
  base_domain: localhost
  target_hosts:
    - "localhost:8200"
    - "localhost:8201"
    - "localhost:8202"
    - "localhost:8203"
    - "localhost:8204"
    - "localhost:8205"
    - "localhost:8206"

findings:
