    evidence: |
      Discovered services:
        - localhost:8200 (www - helpdesk portal)
        - localhost:8201 (chat - AI assistant)
        - localhost:8202 (api - REST API)
        - localhost:8203 (agent - MCP server)
        - localhost:8204 (rag - knowledge base)
        - localhost:8205 (cache - semantic cache)
        - localhost:8206 (docs - documentation portal)
    check_name: "dns_enumeration"
