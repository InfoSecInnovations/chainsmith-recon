# Header analysis — missing security headers, version disclosure
suite: web
emulates: header_analysis
target: "localhost"
disposition: missing_headers

behavior:
  latency_ms: 150

output:
  host: "localhost:8200"
  server_header: "uvicorn/0.27.1"
  missing_headers:
    - X-Content-Type-Options
    - X-Frame-Options
    - Content-Security-Policy
    - Strict-Transport-Security

findings:
  - title: "Server version disclosed in headers"
    description: "The Server header reveals uvicorn version information."
    severity: "low"
    evidence: |
      Server: uvicorn/0.27.1
    check_name: "header_analysis"
  - title: "Missing security headers"
    description: "Critical security headers are absent from HTTP responses on port 8200."
    severity: "medium"
    evidence: |
      Missing: X-Content-Type-Options, X-Frame-Options,
      Content-Security-Policy, Strict-Transport-Security
    check_name: "header_analysis"
