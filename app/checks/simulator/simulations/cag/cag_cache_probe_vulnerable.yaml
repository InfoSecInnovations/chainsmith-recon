# simulations/cag/cag_cache_probe_vulnerable.yaml
#
# Simulates successful cache vulnerability detection.

suite: cag
emulates: cag_cache_probe
target: "cag.fakobanko.local"
disposition: vulnerable

output:
  cache_vulnerabilities:
    - test_id: "cross_session_leak"
      category: "information_leakage"
      description: "Tests if cached responses leak across sessions"
      vulnerability_detected: true
      potential_issue: true
      indicators:
        - "previous conversation"
        - "earlier context"
      response_preview: "Based on our earlier conversation about account balances, I can see that the user in session A discussed their savings account with a balance of..."

    - test_id: "context_id_enumeration"
      category: "information_leakage"
      description: "Tests if context/session IDs are enumerable"
      vulnerability_detected: true
      potential_issue: true
      accessible_ids:
        - "1"
        - "admin"
        - "ctx_1"

  cache_timing_results:
    - test_id: "cache_timing"
      category: "side_channel"
      description: "Analyzes timing differences to infer cache state"
      vulnerability_detected: false
      potential_issue: true
      timing_data:
        first_request_ms: 450.5
        second_request_ms: 85.2
        third_request_ms: 82.1
        speedup_ratio: 0.81
        caching_detected: true
      cache_headers:
        - "x-cache"
        - "x-cache-hit"

    - test_id: "cache_key_collision"
      category: "cache_poisoning"
      description: "Tests for predictable cache key generation"
      vulnerability_detected: false
      potential_issue: true
      responses_identical: true
      cache_hit_detected: false

findings:
  - title: "Cache vulnerability: cross_session_leak"
    description: "Cache vulnerability detected: Tests if cached responses leak across sessions. Category: information_leakage."
    severity: "high"
    evidence: |
      Test: cross_session_leak
      Category: information_leakage
      Indicators: previous conversation, earlier context
      Response preview: Based on our earlier conversation about account balances, I can see that the user in session A discussed their savings account...

  - title: "Cache vulnerability: context_id_enumeration"
    description: "Cache vulnerability detected: Tests if context/session IDs are enumerable. Category: information_leakage. Accessible IDs: 1, admin, ctx_1."
    severity: "high"
    evidence: |
      Test: context_id_enumeration
      Category: information_leakage
      Accessible IDs: 1, admin, ctx_1

  - title: "Potential cache issue: cache_timing"
    description: "Potential cache issue: Analyzes timing differences to infer cache state. Caching behavior confirmed via timing analysis."
    severity: "low"
    evidence: |
      Test: cache_timing
      Category: side_channel
      Timing: 450.5ms -> 85.2ms (speedup: 81%)

  - title: "Potential cache issue: cache_key_collision"
    description: "Potential cache issue: Tests for predictable cache key generation."
    severity: "low"
    evidence: |
      Test: cache_key_collision
      Category: cache_poisoning
