suite: ai
emulates: llm_endpoint_discovery
target: "chat.example.local"
disposition: endpoints_found

output:
  chat_endpoints:
    - url: "http://chat.example.local:8081/v1/chat/completions"
      path: "/v1/chat/completions"
      api_format: "openai"
      status_code: 200
    - url: "http://chat.example.local:8081/api/chat"
      path: "/api/chat"
      api_format: "ollama"
      status_code: 401
