# simulations/ai/tools_fakobanko.yaml
# Fakobanko scenario: chatbot reveals account lookup and transfer tools
suite: ai
emulates: tool_discovery
target: "chat.fakobanko.local"
disposition: tools_found

output:
  discovered_tools:
    - "get_account_balance"
    - "get_transaction_history"
    - "lookup_customer"
    - "transfer_funds"
    - "get_credit_score"
  high_risk:
    - "transfer_funds"
    - "get_credit_score"
