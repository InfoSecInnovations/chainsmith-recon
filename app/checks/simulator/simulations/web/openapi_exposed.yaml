# simulations/web/openapi_exposed.yaml
# Smoke test: OpenAPI spec exposed with sensitive admin endpoints
suite: web
emulates: openapi_discovery
target: "api.example.local"
disposition: spec_found

output:
  spec_path: "/openapi.json"
  endpoints:
    - "/api/v1/users"
    - "/api/v1/admin/users"
    - "/api/v1/models"
    - "/api/v1/internal/config"
    - "/api/v1/auth/token"
  sensitive_endpoints:
    - "/api/v1/admin/users"
    - "/api/v1/internal/config"
  security_schemes: []
