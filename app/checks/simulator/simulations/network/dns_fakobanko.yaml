# simulations/network/dns_fakobanko.yaml
# Fakobanko scenario: DNS enumeration discovers 8 hosts
# DNS only outputs hostnames and IP mappings — no Services or ports
suite: network
emulates: dns_enumeration
target: "fakobanko.local"
disposition: hosts_found

output:
  base_domain: fakobanko.local
  target_hosts:
    - www.fakobanko.local
    - chat.fakobanko.local
    - api.fakobanko.local
    - docs.fakobanko.local
    - mcp.fakobanko.local
    - agent.fakobanko.local
    - rag.fakobanko.local
    - cache.fakobanko.local
  dns_records:
    www.fakobanko.local: "10.0.1.10"
    chat.fakobanko.local: "10.0.1.11"
    api.fakobanko.local: "10.0.1.12"
    docs.fakobanko.local: "10.0.1.13"
    mcp.fakobanko.local: "10.0.1.14"
    agent.fakobanko.local: "10.0.1.15"
    rag.fakobanko.local: "10.0.1.16"
    cache.fakobanko.local: "10.0.1.17"

observations:
  - title: "DNS enumeration: 8 hosts discovered"
    description: "DNS enumeration discovered 8 subdomains for fakobanko.local including AI services (chat, mcp, agent, rag, cache), API, docs, and www."
    severity: "info"
    evidence: |
      Discovered hosts:
        - www.fakobanko.local (10.0.1.10)
        - chat.fakobanko.local (10.0.1.11)
        - api.fakobanko.local (10.0.1.12)
        - docs.fakobanko.local (10.0.1.13)
        - mcp.fakobanko.local (10.0.1.14)
        - agent.fakobanko.local (10.0.1.15)
        - rag.fakobanko.local (10.0.1.16)
        - cache.fakobanko.local (10.0.1.17)
    check_name: "dns_enumeration"
