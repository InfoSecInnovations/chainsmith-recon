# simulations/network/service_probe_success.yaml
# Smoke test: Service probe finds web + API + AI services
suite: network
emulates: service_probe
target: "api.example.local"
disposition: services_fingerprinted

output:
  services:
    - host: "api.example.local"
      port: 8081
      scheme: "http"
      service_type: "api"
      server_header: "uvicorn"
      content_type: "application/json"
